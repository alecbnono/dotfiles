set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Custom Status Bar (Scratch Build) ---

# 1. General Bar Settings
set -g status "on"
set -g status-bg "#232136"   # Rose Pine Moon Base
set -g status-fg "#e0def4"   # Rose Pine Moon Text
set -g status-position bottom
set -g status-justify left

# 2. Left Side: Session & Workspace Info
set -g status-left-length 50
set -g status-left ""

# 3. Window List (The "Tabs")
set -g window-status-format "#[fg=#6e6a86,bg=#232136] #I:#W-"
set -g window-status-current-format "#[fg=#ea9a97,bg=#232136] #I:#W*"
set -g window-status-separator ""

# 4. The Right Side
set -g status-right-length 50
set -g status-right "#[bg=default,fg=#c4a7e7] #(whoami)@#H [#S]"

# 5. Pane Borders (For that Dark Mode feel)
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#c4a7e7"

# tmux-resurrect/tmux-continuum settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Set True Color Terminal
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",xterm*:Tc"
set -g allow-passthrough on
set -g mouse on

set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

# Set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Set Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set source file bind
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Settings for kitty terminal
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

# Force Rename
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{pane_current_command}"

# Split in Current Working Directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

run '~/.tmux/plugins/tpm/tpm'
